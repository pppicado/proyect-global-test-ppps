<div class="container" #windowOrigin>
  <h1>Angular Floating Windows Demo</h1>
  <p>Click the buttons below to open floating windows. You can drag and resize them.</p>
  <div class="d-grid gap-2 d-md-block">
    <button class="btn btn-primary me-2" (click)="openChart()">Open Chart</button>
    <button class="btn btn-secondary me-2" (click)="openForm()">Open Form</button>
    <button class="btn btn-warning" (click)="openModalExample()">Open Modal</button>
  </div>
</div>
